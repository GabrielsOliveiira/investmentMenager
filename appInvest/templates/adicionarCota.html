{% extends 'base.html' %}

{% block titulo %}Adicionar cota{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-container">
        <form action="" method="post">
            <div class="campo">
                <label for="invested_value">Valor investido</label>
                <input type="number" name="invested_value" step="0.01" required>
            </div>    
            <div class="campo">
                <label for="quantidades_cotas">Quantidade de cotas</label>
                <input type="number" name="quantidades_cotas" step="0.01" required>
            </div>
            <button type="submit" class="btn-confirmar">Confirmar</button>
        </form>
    </div>
</div>
<link rel="stylesheet" href="{{ url_for('static', filename='css/styleAdicionarCota.css') }}">
{% endblock %}
